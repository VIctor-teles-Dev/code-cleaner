apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: url-shortener
  template:
    metadata:
      labels:
        app: url-shortener
    spec:
      containers:
        - name: url-shortener
          image: ccl/url-shortener:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            # Compartilha o Postgres com o backend-api; as migrations deste
            # serviço usam uma tabela de histórico própria (shortener_schema_migrations).
            - name: DATABASE_URL
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)?sslmode=disable
            # Prefixo do short_url devolvido na criação (subdomínio do redirect).
            - name: BASE_URL
              value: http://curto.ccl.app.br
            # GeoIP é opcional: para habilitar o país, monte um volume com o
            # GeoLite2-Country.mmdb e aponte GEOIP_DB_PATH para ele. Sem isso o
            # país fica vazio (degradação graciosa).
            # - name: GEOIP_DB_PATH
            #   value: /geoip/GeoLite2-Country.mmdb
          # Token do POST /api/v1/urls e do analytics — SealedSecret no repo.
          envFrom:
            - secretRef:
                name: url-shortener-admin-token
                optional: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: url-shortener
spec:
  selector:
    app: url-shortener
  ports:
    - name: http
      port: 8080
      targetPort: 8080
