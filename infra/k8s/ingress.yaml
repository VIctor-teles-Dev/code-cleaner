# Roteamento por subdomínio sob o domínio pai ccl.app.br:
#   code-cleaner.ccl.app.br      -> web-app (página principal)
#   api.code-cleaner.ccl.app.br  -> backend-api
#
# Para cada novo app, adicione regras seguindo o padrão:
#   <app>.ccl.app.br     -> service do app
#   api.<app>.ccl.app.br -> API do app (se houver)
# O domínio raiz ccl.app.br fica reservado para um futuro hub/landing.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ccl
spec:
  ingressClassName: nginx
  rules:
    - host: code-cleaner.ccl.app.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-app
                port:
                  number: 3000
    - host: api.code-cleaner.ccl.app.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-api
                port:
                  number: 8080
