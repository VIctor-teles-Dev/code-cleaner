apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
spec:
  # 1 réplica: a VPS tem só 1.9 GB. Suba de novo se migrar p/ um host maior.
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-app
          image: ccl/web-app:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
            # Destino do proxy same-origin /api/contact (service interno)
            - name: BACKEND_URL
              value: http://backend-api:8080
            # Encurtador: proxies same-origin /api/encurtador/* -> backend interno.
            # O token fica no servidor (nunca chega ao browser).
            - name: SHORTENER_URL
              value: http://url-shortener:8080
            - name: URL_SHORTENER_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: url-shortener-admin-token
                  key: URL_SHORTENER_ADMIN_TOKEN
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web-app
spec:
  selector:
    app: web-app
  ports:
    - name: http
      port: 3000
      targetPort: 3000
