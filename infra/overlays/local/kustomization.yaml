apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Overlay de DEV (kind). Reusa TODOS os manifests de produção (../../k8s) e só
# reescreve o roteamento: os hosts de prod (*.ccl.app.br) viram *.localhost.
# Assim o cluster local para de "roubar" os domínios reais no /etc/hosts /
# navegador — prod continua resolvendo pro VPS e o dev tem a própria URL.
resources:
  - ../../k8s

patches:
  # Ingress: hosts de prod -> *.localhost; remove TLS + a annotation do
  # cert-manager (Let's Encrypt HTTP-01 não valida localhost; dev roda HTTP).
  - path: ingress-local.patch.yaml
    target:
      kind: Ingress
      name: ccl
  # url-shortener: short_url dos links criados no dev aponta pro host local,
  # não pro de produção.
  - path: shortener-local.patch.yaml
  # Sem cert-manager no kind: descarta os ClusterIssuers do Let's Encrypt,
  # senão o apply erra (CRD cert-manager.io ausente). Dev é HTTP puro.
  - patch: |
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt-prod
      $patch: delete
  - patch: |
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt-staging
      $patch: delete
