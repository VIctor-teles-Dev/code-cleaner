name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: Testes, lint e build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: wbc
          POSTGRES_PASSWORD: wbc
          POSTGRES_DB: wbc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wbc -d wbc_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # habilita os testes de integração do backend (migrations contra Postgres real)
      TEST_DATABASE_URL: postgres://wbc:wbc@localhost:5432/wbc_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/backend-api/go.mod
          cache-dependency-path: apps/backend-api/go.sum

      - run: bun install --frozen-lockfile

      - run: bun run test

      - run: bun run lint

      - run: bun run build
